# Example configuration file for notion-cli
# Location: ~/.config/notion-cli/config.yaml
#
# This file is optional. All settings can be overridden by CLI flags.
# Create this file with: notion config set <key> <value>

# Default output format (text, json, table, yaml)
# CLI override: --output json
output: json

# Default color mode (auto, always, never)
# CLI override: --color always
color: auto

# Default workspace name for multi-workspace support
# This is used to select which workspace configuration to use
default_workspace: personal

# Workspace-specific configurations
# Each workspace can have its own token source and output format
workspaces:
  # Personal workspace using keyring for token storage
  personal:
    token_source: keyring
    output: json

  # Work workspace using environment variable for token
  work:
    token_source: env:NOTION_TOKEN_WORK
    output: table

  # Example of another workspace with different settings
  freelance:
    token_source: keyring
    output: yaml

# Notes:
# - Config file is created with 0600 permissions (owner read/write only)
# - Config directory is created with 0700 permissions (owner read/write/execute only)
# - CLI flags always take precedence over config file settings
# - If a setting is not specified in config, CLI defaults are used
# - Workspace support is planned but not yet fully implemented
